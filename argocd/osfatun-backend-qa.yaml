# =============================================================================
# ArgoCD Application — OSFATUN Backend (QA)
# =============================================================================
# Despliega el backend Django en el namespace osfatun-qa.
# Duplicado de osfatun-backend.yaml (desarrollo) con ajustes de entorno.
#
# IMPORTANTE — Política de secretos:
#   Este archivo declara TODOS los parameters (sensibles y no sensibles).
#   Los sensibles tienen valor vacío ("") para que al desplegar solo
#   haya que rellenarlos desde la UI de ArgoCD:
#     Applications → <app> → App Details → PARAMETERS → Edit
#
#   Planilla completa de referencia:
#     kubernetes/documentacion/argocd-backend-values.md
#
# Antes de aplicar:
#   1. ArgoCD instalado y el repo registrado (argocd repo add ...).
#   2. Redis compartido desplegado (argocd/redis.yaml).
#   3. Base de datos creada en PostgreSQL:
#        CREATE DATABASE osfatun_qa OWNER app;
#   4. Grupo "ENT-QA" creado en Keycloak (realm osfatun).
#   5. Cargar los parameters sensibles en la UI de ArgoCD ANTES del primer
#      sync (ver argocd-backend-values.md).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: osfatun-backend-qa
  namespace: argocd
spec:
  project: default

  source:
    repoURL: CHANGE_ME_GIT_REPO_URL  # <-- Ej: https://github.com/org/osfatun-infra.git
    targetRevision: HEAD
    path: kubernetes/charts/osfatun-backend

    helm:
      parameters:
        # -------------------------------------------------------------------
        # Parameters POR-ENTORNO (no sensibles) — pueden vivir en Git.
        # -------------------------------------------------------------------

        # -- Imagen (registry + tag) --
        - name: image.repository
          value: CHANGE_ME_REGISTRY/osfatun-backend
        - name: image.tag
          value: latest

        # -- Registry (imagePullSecret) --
        - name: imagePullSecret.dockerconfigjson
          value: ""

        # -- Base de datos (nombre por entorno) --
        - name: db.name
          value: ""
        - name: db.user
          value: ""
        - name: db.password
          value: ""

        # -- Redis (DB number aislado por entorno) --
        - name: redis.db
          value: "1"

        # -- Django (entorno) --
        - name: django.envStage
          value: QA
        - name: django.settingsModule
          value: config.settings.production
        - name: django.debug
          value: "False"

        # -- Ingress y CORS (dominio por entorno) --
        - name: ingress.host
          value: ""
        - name: cors.whitelist
          value: ""
        - name: cors.trustedOrigins
          value: ""

        # -- Keycloak (URLs y realm — NO sensibles) --
        - name: keycloak.url
          value: "http://keycloak.keycloak.svc.cluster.local:8080"
        - name: keycloak.frontendUrl
          value: "https://auth.osfatun.com.ar"
        - name: keycloak.realm
          value: ""
        - name: keycloak.environmentGroup
          value: "ENT-QA"

        # -- Django secret key --
        - name: django.secretKey
          value: ""

        # -- Keycloak admin --
        - name: keycloak.adminUser
          value: ""
        - name: keycloak.adminPassword
          value: ""

        # -- Email SMTP --
        - name: email.defaultFrom
          value: ""
        - name: email.user
          value: ""
        - name: email.password
          value: ""

  destination:
    server: https://kubernetes.default.svc
    namespace: osfatun-qa

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
