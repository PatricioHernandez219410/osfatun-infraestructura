# =============================================================================
# ArgoCD Application — OSFATUN Backend (Producción)
# =============================================================================
# Despliega el backend Django en el namespace osfatun-prod.
# Para crear otro entorno (qa, dev), duplicar este archivo cambiando:
#   - metadata.name
#   - destination.namespace
#   - parameters: db.name, redis.db, ingress.host, django.envStage, etc.
#
# Antes de aplicar:
#   1. ArgoCD instalado y el repo registrado
#   2. Redis compartido desplegado (argocd/redis.yaml)
#   3. Base de datos creada en PostgreSQL
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: osfatun-backend-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: CHANGE_ME_GIT_REPO_URL  # <-- Ej: https://github.com/org/osfatun-infra.git
    targetRevision: HEAD
    path: kubernetes/charts/osfatun-backend

    helm:
      parameters:
        # -- Imagen --
        - name: image.repository
          value: CHANGE_ME_REGISTRY/osfatun-backend
        - name: image.tag
          value: latest
        # -- Secrets (no commitear valores reales) --
        - name: db.password
          value: CHANGE_ME_DB_APP_PASSWORD
        - name: django.secretKey
          value: CHANGE_ME_DJANGO_SECRET_KEY
        - name: imagePullSecret.dockerconfigjson
          value: CHANGE_ME_BASE64_DOCKER_CONFIG
        # -- Entorno --
        - name: db.name
          value: osfatun
        - name: redis.db
          value: "0"
        - name: django.envStage
          value: PRODUCTION
        - name: ingress.host
          value: api.osfatun.ticksar.com.ar
        - name: cors.whitelist
          value: "https://api.osfatun.ticksar.com.ar"
        - name: cors.trustedOrigins
          value: "https://api.osfatun.ticksar.com.ar"

  destination:
    server: https://kubernetes.default.svc
    namespace: osfatun-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
