# =============================================================================
# ArgoCD Application — OSFATUN Backend (Producción)
# =============================================================================
# Despliega el backend Django en el namespace osfatun-prod.
#
# Para crear otro entorno (qa, dev), duplicar este archivo cambiando:
#   - metadata.name               (osfatun-backend-qa, osfatun-backend-dev)
#   - destination.namespace       (osfatun-qa, osfatun-dev)
#   - parameters: db.name, redis.db, ingress.host, django.envStage,
#                 django.settingsModule, django.debug, cors.*
#
# IMPORTANTE — Política de secretos:
#   Este archivo declara TODOS los parameters (sensibles y no sensibles).
#   Los sensibles tienen valor vacío ("") para que al desplegar solo
#   haya que rellenarlos desde la UI de ArgoCD:
#     Applications → <app> → App Details → PARAMETERS → Edit
#
#   Planilla completa de referencia:
#     kubernetes/documentacion/argocd-backend-values.md
#
# Antes de aplicar:
#   1. ArgoCD instalado y el repo registrado (argocd repo add ...).
#   2. Redis compartido desplegado (argocd/redis.yaml).
#   3. Base de datos creada en PostgreSQL:
#        CREATE DATABASE osfatun OWNER app;
#   4. Cargar los parameters sensibles en la UI de ArgoCD ANTES del primer
#      sync (ver argocd-backend-values.md). Alternativamente, crear la app
#      con auto-sync deshabilitado, cargar los secretos y recién ahí sincronizar.
#
# Tras el primer deploy, los valores sensibles se editan directamente
# desde la UI de ArgoCD. Si se re-aplica este YAML, los valores vacíos
# se sobreescriben con lo que haya en la UI gracias a ServerSideApply.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: osfatun-backend-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: CHANGE_ME_GIT_REPO_URL  # <-- Ej: https://github.com/org/osfatun-infra.git
    targetRevision: HEAD
    path: kubernetes/charts/osfatun-backend

    helm:
      parameters:
        # -------------------------------------------------------------------
        # Parameters POR-ENTORNO (no sensibles) — pueden vivir en Git.
        # Para otros entornos, duplicar este archivo y ajustar estos valores.
        # -------------------------------------------------------------------

        # -- Imagen (registry + tag) --
        - name: image.repository
          value: CHANGE_ME_REGISTRY/osfatun-backend      # ej: registry.gitlab.com/org/osfatun-backend
        - name: image.tag
          value: latest                                  # idealmente fijar un tag versionado

        # -- Registry (imagePullSecret) --
        - name: imagePullSecret.dockerconfigjson
          value: ""

        # -- Base de datos (nombre por entorno) --
        - name: db.name
          value: ""
        - name: db.user
          value: ""
        - name: db.password
          value: ""

        # -- Redis (DB number aislado por entorno) --
        - name: redis.db
          value: "0"

        # -- Django (entorno) --
        - name: django.envStage
          value: DESA
        - name: django.settingsModule
          value: config.settings.development
        - name: django.debug
          value: "True"

        # -- Ingress y CORS (dominio por entorno) --
        - name: ingress.host
          value: api.osfatun.com.ar
        - name: cors.whitelist
          value: "https://api.osfatun.com.ar"
        - name: cors.trustedOrigins
          value: "https://api.osfatun.com.ar"

        # -- Keycloak (URLs y realm — NO sensibles) --
        - name: keycloak.url
          value: "http://keycloak.keycloak.svc.cluster.local:8080"
        - name: keycloak.frontendUrl
          value: "https://auth.osfatun.com.ar"
        - name: keycloak.realm
          value: ""

        # -- Django secret key --
        - name: django.secretKey
          value: ""

        # -- Keycloak admin --
        - name: keycloak.adminUser
          value: ""
        - name: keycloak.adminPassword
          value: ""

        # -- Email SMTP --
        - name: email.defaultFrom
          value: "noreply@osfatun.com.ar"
        - name: email.user
          value: ""
        - name: email.password
          value: ""

  destination:
    server: https://kubernetes.default.svc
    namespace: osfatun-desa

  syncPolicy:
    # Recomendación: la PRIMERA vez crear la app con syncPolicy.automated
    # deshabilitado, cargar los secretos vía UI, y recién ahí activar auto-sync.
    # Una vez cargados, este bloque automatizado es seguro.
    # automated:
      # prune: true
      # selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # preserva parameters cargados por UI al re-aplicar
