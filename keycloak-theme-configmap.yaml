apiVersion: v1
binaryData:
  favicon.png: 
  logo.png: 
data:
  login-reset-password.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayInfo=false displayMessage=false; section>
      <#if section = "form">

        <#assign isAdmin = (client.clientId!'') == "osfatun-admin">

        <div class="os-page<#if isAdmin> os-page--admin</#if>">

          <!-- ══════════════════════════════════
               COLUMNA IZQUIERDA — Branding
               ══════════════════════════════════ -->
          <div class="os-left">

            <div class="os-left-inner">
              <img src="${url.resourcesPath}/img/logo.png" alt="OSFATUN" class="os-logo-img" />

              <div class="os-hero">
                <#if isAdmin>
                  <div class="os-admin-badge">
                    <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    Acceso Restringido
                  </div>
                  <h1 class="os-hero-title">Panel de<br><em>Administraci&oacute;n</em></h1>
                  <p class="os-hero-desc">Acceso exclusivo para administradores<br>del sistema OSFATUN.</p>
                <#else>
                  <h1 class="os-hero-title">Sistema de<br><em>Gesti&oacute;n Integral</em></h1>
                  <p class="os-hero-desc">Administraci&oacute;n de beneficiarios, prestaciones,<br>recaudaci&oacute;n y reportes OSFATUN.</p>
                </#if>
              </div>
            </div>

          </div><!-- /os-left -->

          <!-- ══════════════════════════════════
               COLUMNA DERECHA — Formulario
               ══════════════════════════════════ -->
          <div class="os-right">

            <div class="os-card">

              <!-- Cabecera con flecha volver -->
              <div class="os-card-header os-card-header--reset">
                <a href="${url.loginUrl}" class="os-back-btn" aria-label="Volver al inicio de sesi&oacute;n">
                  <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 19l-7-7 7-7"/>
                  </svg>
                </a>
                <div class="os-card-header-text">
                  <h2 class="os-card-title">Recuperar contrase&ntilde;a</h2>
                  <p class="os-card-subtitle">Ingres&aacute; tu documento para recibir instrucciones</p>
                </div>
              </div>

              <!-- Alerta de error/warning -->
              <#if message?has_content && (message.type = 'error' || message.type = 'warning')>
                <div class="os-alert">
                  <svg class="os-alert-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                  <span>${kcSanitize(message.summary)?no_esc}</span>
                </div>
              </#if>

              <!-- Info box -->
              <div class="os-info-box">
                <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
                <span>Le enviaremos un enlace de recuperaci&oacute;n al email registrado en el sistema.</span>
              </div>

              <!-- Formulario -->
              <form id="kc-reset-password-form" action="${url.loginAction}" method="post">

                <div class="os-field">
                  <label for="username">DNI / CUIL / CUIT / MAIL</label>
                  <div class="os-input-wrap">
                    <span class="os-input-icon">
                      <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                      </svg>
                    </span>
                    <input id="username" name="username" type="text"
                           autofocus autocomplete="username"
                           placeholder="Ej: 32456789 &oacute; 20-32456789-1"
                           value="${(auth.attemptedUsername!'')}" />
                  </div>
                </div>

                <div id="kc-form-buttons">
                  <button class="os-btn-reset" type="submit">
                    <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Buscar y enviar enlace
                  </button>
                </div>

              </form>

            </div><!-- /os-card -->

          </div><!-- /os-right -->

          <div class="os-footer">
            &copy; ${.now?string('yyyy')} OSFATUN &mdash; Todos los derechos reservados
          </div>

        </div><!-- /os-page -->

      </#if>
    </@layout.registrationLayout>
  login.css: |
    /* ═══════════════════════════════════════════════
       OSFATUN — Keycloak Login Theme 2026
       ═══════════════════════════════════════════════ */

    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    /* ── Reset global ── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      min-height: 100vh !important;
      overflow-x: hidden !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent !important;
    }

    body {
      display: flex !important;
      flex-direction: column !important;
    }

    /* ── Ocultar chrome de KC ── */
    #kc-header, #kc-header-wrapper, #kc-locale,
    .navbar, .kc-navbar, .pf-c-page__header {
      display: none !important;
      height: 0 !important;
      min-height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      overflow: hidden !important;
    }

    .login-pf, .login-pf body, .login-pf-page,
    #kc-form-wrapper, #kc-content, #kc-content-wrapper, #kc-container,
    .card-pf, .login-pf-page .card-pf,
    .login-pf .container, .login-pf .container-fluid,
    .login-pf-page .container, .login-pf-page .container-fluid,
    .login-pf-page .login-pf-body, .login-pf-page .login-pf-header,
    .login-pf-page .login-pf-signup, #kc-login, #kc-form,
    .login-pf-page > * {
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      max-width: 100% !important;
      width: 100% !important;
      min-height: 0 !important;
    }

    #kc-form-buttons { margin: 0; }

    /* ═══════════════════════════════════════════════
       PÁGINA — layout dos columnas
       ═══════════════════════════════════════════════ */

    .os-page {
      width: 100% !important;
      flex: 1;
      min-height: 100vh;
      display: flex !important;
      flex-direction: row !important;
      align-items: center;
      position: relative;
      background: linear-gradient(135deg, #0A1C2E 0%, #0c2a40 30%, #0d4d60 60%, #0E7080 100%);
      overflow: hidden;
    }

    /* Círculo decorativo superior derecho */
    .os-page::before {
      content: '';
      position: absolute;
      top: -220px;
      right: 35%;
      width: 580px;
      height: 580px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,112,128,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Círculo decorativo inferior izquierdo */
    .os-page::after {
      content: '';
      position: absolute;
      bottom: -200px;
      left: -100px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,112,128,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Variante Admin ── */
    .os-page--admin {
      background: linear-gradient(135deg, #1a0505 0%, #3d0f0f 30%, #5c1a1a 60%, #2d0a0a 100%);
    }

    .os-page--admin .os-card {
      border-top-color: rgba(220,38,38,0.5);
      box-shadow:
        1px 0px 0px 0px rgba(220,38,38,0.15) inset,
        0px 1px 0px 0px rgba(220,38,38,0.20) inset,
        0px 25px 50px -12px rgba(0,0,0,0.50);
    }

    .os-page--admin .os-hero-title em {
      color: #f87171;
    }

    /* Badge acceso restringido */
    .os-admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(220,38,38,0.20);
      border: 1px solid rgba(220,38,38,0.40);
      color: #fca5a5;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 0.5rem;
      width: fit-content;
    }

    /* ═══════════════════════════════════════════════
       COLUMNA IZQUIERDA
       ═══════════════════════════════════════════════ */

    .os-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3.5rem 3rem 3.5rem 5rem;
      position: relative;
      z-index: 1;
      align-self: stretch;
    }

    .os-left-inner {
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
      padding-top: 0;
    }

    .os-logo-img {
      height: 200px;
      width: fit-content;
      object-fit: contain;
      display: block;
      margin-left: -10px;
    }

    /* ── Bloque hero ── */
    .os-hero {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .os-hero-title {
      font-size: 2.8rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .os-hero-title em {
      font-style: italic;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #FBB220;
      font-size: 3.4rem;
      font-weight: 700;
      line-height: 1.1;
      display: block;
      letter-spacing: -0.01em;
    }

    .os-hero-desc {
      font-size: 0.9375rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin: 0;
      font-weight: 400;
      max-width: 380px;
    }

    /* ── Footer ── */
    .os-footer {
      color: rgba(255,255,255,0.3);
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      font-weight: 400;
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      width: 50%;
      text-align: center;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════
       COLUMNA DERECHA
       ═══════════════════════════════════════════════ */

    .os-right {
      width: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 3.5rem 2.5rem 2rem;
      position: relative;
      z-index: 1;
      align-self: stretch;
    }

    /* ═══════════════════════════════════════════════
       TARJETA
       ═══════════════════════════════════════════════ */

    .os-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 2.25rem 2rem 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow:
        1px 0px 0px 0px rgba(255,255,255,0.10) inset,
        0px 1px 0px 0px rgba(255,255,255,0.15) inset,
        0px 25px 50px -12px rgba(0,0,0,0.40);
    }

    /* ── Cabecera de la tarjeta ── */
    .os-card-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .os-card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 0.5rem;
      letter-spacing: -0.01em;
    }

    .os-card-subtitle {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.5);
      margin: 0;
      font-weight: 400;
    }

    /* ── Alerta de error ── */
    .os-alert {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.35);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.8125rem;
      margin-bottom: 1.25rem;
      line-height: 1.4;
    }

    .os-alert-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Campos ── */
    .os-field {
      margin-bottom: 1.25rem;
    }

    .os-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.5rem;
    }

    .os-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .os-input-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      width: 17px;
      height: 17px;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .os-field input[type="text"],
    .os-field input[type="password"] {
      width: 100%;
      padding: 0.85rem 3rem 0.85rem 2.75rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 0.9375rem;
      color: #ffffff;
      outline: none;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      font-family: inherit;
    }

    .os-field input[type="text"]::placeholder,
    .os-field input[type="password"]::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .os-field input:focus {
      border-color: rgba(14,112,128,0.8);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 0 0 3px rgba(14,112,128,0.20);
    }

    /* ── Toggle mostrar contraseña ── */
    .os-eye-btn {
      position: absolute;
      right: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .os-eye-btn:hover { color: rgba(255,255,255,0.65); }

    /* ── Botón principal ── */
    .os-btn-submit {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.9rem 1.25rem;
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-weight: 700;
      font-size: 0.9375rem;
      cursor: pointer;
      background: #FBB220;
      box-shadow: 0 4px 20px rgba(251,178,32,0.40);
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .os-btn-submit:hover {
      background: #f0a800;
      box-shadow: 0 6px 24px rgba(251,178,32,0.50);
    }

    .os-btn-submit:active { transform: scale(0.987); }

    /* ── Divisor ── */
    .os-divider {
      display: flex;
      align-items: center;
      margin: 1.25rem 0;
    }

    .os-divider span {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.10);
    }

    /* ── Botón Google ── */
    .os-btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      padding: 0.85rem 1.25rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
      font-family: inherit;
    }

    .os-btn-google:hover {
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.22);
    }

    /* ── Link olvidé contraseña ── */
    .os-links {
      text-align: center;
      margin-top: 1.25rem;
    }

    .os-links a {
      color: rgba(255,255,255,0.45);
      font-size: 0.8125rem;
      text-decoration: none;
      font-weight: 400;
      transition: color 0.15s;
    }

    .os-links a:hover { color: rgba(255,255,255,0.75); }

    /* ═══════════════════════════════════════════════
       RESET CREDENTIALS — estilos específicos
       ═══════════════════════════════════════════════ */

    /* Cabecera con flecha + texto en fila */
    .os-card-header--reset {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 1rem;
      text-align: left;
      margin-bottom: 1.5rem;
    }

    .os-back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      margin-top: 2px;
    }

    .os-back-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #ffffff;
    }

    .os-card-header-text {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    /* Info box */
    .os-info-box {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      background: rgba(14,112,128,0.18);
      border: 1px solid rgba(14,112,128,0.35);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.5rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.8125rem;
      line-height: 1.5;
    }

    .os-info-box svg {
      flex-shrink: 0;
      margin-top: 1px;
      color: #0E7080;
    }

    /* Botón teal (reset) */
    .os-btn-reset {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.9rem 1.25rem;
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
      background: #0E7080;
      box-shadow: 0 4px 20px rgba(14,112,128,0.35);
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .os-btn-reset:hover {
      background: #0c6270;
      box-shadow: 0 6px 24px rgba(14,112,128,0.45);
    }

    .os-btn-reset:active { transform: scale(0.987); }

    /* ═══════════════════════════════════════════════
       RESPONSIVO
       ═══════════════════════════════════════════════ */

    @media (max-width: 900px) {
      .os-page {
        flex-direction: column !important;
        align-items: stretch;
        min-height: 100vh;
        overflow: visible;
      }

      .os-left {
        align-self: auto;
        padding: 3rem 2rem 0 2rem;
        align-items: center;
        justify-content: flex-start;
        text-align: center;
      }

      .os-left-inner {
        align-items: center;
        gap: 1.5rem;
        width: 100%;
      }

      .os-logo-img {
        margin-left: 0;
        height: 150px;
        align-self: center;
      }

      .os-hero-desc {
        text-align: center;
        max-width: 100%;
      }

      .os-footer {
        position: static;
        width: 100%;
        text-align: center;
        padding: 1.5rem 1rem;
        margin-top: 0;
      }

      .os-hero-title { font-size: 2.4rem; }
      .os-hero-title em { font-size: 2.8rem; }

      .os-right {
        align-self: auto;
        width: 100%;
        padding: 1.5rem 2rem 3rem;
      }
    }

    @media (max-width: 480px) {
      .os-left { padding: 2rem 1.25rem 0 1.25rem; }
      .os-logo-img { height: 130px; margin-left: 0; }
      .os-hero-title { font-size: 2rem; }
      .os-hero-title em { font-size: 2.35rem; }
      .os-card { padding: 1.75rem 1.25rem 1.5rem; border-radius: 16px; }
      .os-right { padding: 1rem 1.25rem 2.5rem; }
    }
  login.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayInfo=false displayMessage=false; section>
      <#if section = "form">

        <#assign isAdmin = (client.clientId!'') == "osfatun-admin">

        <div class="os-page<#if isAdmin> os-page--admin</#if>">

          <!-- ══════════════════════════════════
               COLUMNA IZQUIERDA — Branding
               ══════════════════════════════════ -->
          <div class="os-left">

            <div class="os-left-inner">
              <img src="${url.resourcesPath}/img/logo.png" alt="OSFATUN" class="os-logo-img" />

              <div class="os-hero">
                <#if isAdmin>
                  <div class="os-admin-badge">
                    <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    Acceso Restringido
                  </div>
                  <h1 class="os-hero-title">Panel de<br><em>Administraci&oacute;n</em></h1>
                  <p class="os-hero-desc">Acceso exclusivo para administradores<br>del sistema OSFATUN.</p>
                <#else>
                  <h1 class="os-hero-title">Sistema de<br><em>Gesti&oacute;n Integral</em></h1>
                  <p class="os-hero-desc">Administraci&oacute;n de beneficiarios, prestaciones,<br>recaudaci&oacute;n y reportes OSFATUN.</p>
                </#if>
              </div>
            </div>

          </div><!-- /os-left -->

          <!-- ══════════════════════════════════
               COLUMNA DERECHA — Formulario
               ══════════════════════════════════ -->
          <div class="os-right">

            <div class="os-card">

              <!-- Cabecera -->
              <div class="os-card-header">
                <#if isAdmin>
                  <h2 class="os-card-title">Acceso Administrador</h2>
                  <p class="os-card-subtitle">Ingres&aacute; tus credenciales de administrador</p>
                <#else>
                  <h2 class="os-card-title">Iniciar sesi&oacute;n</h2>
                  <p class="os-card-subtitle">Ingres&aacute; tus credenciales para continuar</p>
                </#if>
              </div>

              <!-- Alerta de error/warning -->
              <#if message?has_content && (message.type = 'error' || message.type = 'warning')>
                <div class="os-alert">
                  <svg class="os-alert-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                  <span>${kcSanitize(message.summary)?no_esc}</span>
                </div>
              </#if>

              <!-- Formulario -->
              <form id="kc-form-login" action="${url.loginAction}" method="post">

                <div class="os-field">
                  <label for="username">USUARIO</label>
                  <div class="os-input-wrap">
                    <span class="os-input-icon">
                      <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                      </svg>
                    </span>
                    <input id="username" name="username" type="text"
                           autofocus autocomplete="username"
                           placeholder="admin"
                           value="${(login.username!'')}" />
                  </div>
                </div>

                <div class="os-field">
                  <label for="password">CONTRASE&Ntilde;A</label>
                  <div class="os-input-wrap">
                    <span class="os-input-icon">
                      <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                      </svg>
                    </span>
                    <input id="password" name="password" type="password"
                           autocomplete="current-password"
                           placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" />
                    <button type="button" class="os-eye-btn" onclick="togglePassword()" aria-label="Mostrar contrase&ntilde;a">
                      <svg id="eye-icon" width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                      </svg>
                    </button>
                  </div>
                </div>

                <div id="kc-form-buttons">
                  <button class="os-btn-submit" type="submit">
                    <svg width="17" height="17" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    Ingresar al sistema
                  </button>
                </div>

              </form>

              <!-- Social login — Google (solo si está configurado en el realm) -->
              <#if social?? && social.providers?has_content>
                <div class="os-divider"><span></span></div>
                <#list social.providers as p>
                  <#if p.alias == "google">
                    <a href="${p.loginUrl}" class="os-btn-google">
                      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
                        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                      </svg>
                      Ingresar con cuenta de Google
                    </a>
                  </#if>
                </#list>
              </#if>

              <#if realm.resetPasswordAllowed>
                <div class="os-links">
                  <a href="${url.loginResetCredentialsUrl}">&iquest;Olvidaste tu contrase&ntilde;a?</a>
                </div>
              </#if>

            </div><!-- /os-card -->

          </div><!-- /os-right -->

          <div class="os-footer">
            &copy; ${.now?string('yyyy')} OSFATUN &mdash; Todos los derechos reservados
          </div>

        </div><!-- /os-page -->

        <script>
          function togglePassword() {
            var input = document.getElementById('password');
            var icon  = document.getElementById('eye-icon');
            if (input.type === 'password') {
              input.type = 'text';
              icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            } else {
              input.type = 'password';
              icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
          }
        </script>

      </#if>
    </@layout.registrationLayout>
  template.ftl: |
    <#macro registrationLayout bodyClass="" displayInfo=false displayMessage=true displayRequiredFields=false displayWide=false showAnotherWayIfPresent=true>
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>OSFATUN — Iniciar sesión</title>
        <link rel="icon" type="image/png" href="${url.resourcesPath}/img/favicon.png" />
        <link rel="apple-touch-icon" href="${url.resourcesPath}/img/favicon.png" />
        <link rel="stylesheet" href="${url.resourcesPath}/css/login.css" />
    </head>
    <body>
        <#nested "form">
    </body>
    </html>
    </#macro>
  theme.properties: |
    parent=keycloak
    import=common/keycloak
    styles=css/login.css
kind: ConfigMap
