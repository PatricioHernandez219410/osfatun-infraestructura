apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: pomerium
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: pomerium
spec:
  selector:
    app: whoami
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  namespace: pomerium
  annotations:
    ingress.pomerium.io/allow_public_unauthenticated_access: "true"
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: pomerium
  tls:
    - hosts:
        - ejemplouno.local.osfatun.com.ar
      secretName: whoami-tls
  rules:
    - host: ejemplouno.local.osfatun.com.ar
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
