apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: pomerium
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1
          ports:
            - name: http
              containerPort: 3001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  namespace: pomerium
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # Si tenés otra StorageClass, cambiala acá. En k3s suele ser "local-path".
  storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: pomerium
spec:
  selector:
    app: uptime-kuma
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-kuma
  namespace: pomerium
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    ingress.pomerium.io/allow_any_authenticated_user: "true"
    ingress.pomerium.io/pass_identity_headers: "true"
spec:
  ingressClassName: pomerium
  tls:
    - hosts:
        - ejemplodos.local.osfatun.com.ar
      secretName: uptime-kuma-tls
  rules:
    - host: ejemplodos.local.osfatun.com.ar
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: uptime-kuma
                port:
                  number: 3001
---
apiVersion: v1
kind: Pod
metadata:
  name: uptime-kuma-fix
  namespace: pomerium
spec:
  restartPolicy: Never
  containers:
    - name: fix
      image: busybox
      command: ["sh","-lc","ls -la /app/data || true; sleep 1"]
