# =============================================================================
# OSFATUN Frontend (Panel Central) — Helm Values
# =============================================================================
# Valores por defecto del chart.
#
# Convención (IMPORTANTE):
#   - Campos con valor NO vacío  => defaults razonables; se pueden sobreescribir
#                                    desde ArgoCD (parameters o valueFiles) por
#                                    entorno si hace falta.
#   - Campos con valor ""        => SENSIBLES. El chart los deja explícitamente
#                                    vacíos para obligar a cargarlos desde la
#                                    interfaz web de ArgoCD como `parameters`
#                                    del Application. De este modo NUNCA quedan
#                                    versionados en Git.
#
# NOTA sobre variables VITE_*:
#   La imagen Docker se construye con placeholders (__VITE_*__). Al iniciar
#   el contenedor, un entrypoint reemplaza los placeholders por los valores
#   reales de las env vars. Esto permite usar UNA sola imagen para todos los
#   entornos, gestionando los valores desde ArgoCD (sección `env` abajo).
#
# Planilla completa de parameters a cargar en ArgoCD UI por cada entorno:
#   -> kubernetes/documentacion/argocd-frontend-values.md
# =============================================================================

# -- Variables de entorno del frontend (runtime) ------------------------------
# Estas variables se inyectan como env vars en el contenedor. El entrypoint
# del Dockerfile reemplaza los placeholders __VITE_*__ en los archivos JS
# con estos valores al iniciar. Así se usa UNA sola imagen para todos los
# entornos, cambiando solo los values por entorno desde ArgoCD.
env:
  viteApiAddress: ""             # ej: https://api.desa.osfatun.com.ar/api
  viteAppName: Osfatun
  viteAppEnv: ""                 # ej: development, production
  viteDebug: "false"
  viteKcUrl: ""                  # ej: https://auth.osfatun.com.ar
  viteKcRealm: osfatun
  viteKcClientId: osfatun-frontend
  viteAdminUrl: ""               # ej: https://admin.desa.osfatun.com.ar

# -- Imagen del frontend ------------------------------------------------------
image:
  # Registry + repo. Se sobreescribe por entorno desde el Application YAML.
  repository: ""          # ej: registry.gitlab.com/org/osfatun-frontend
  tag: latest
  pullPolicy: Always

imagePullSecret:
  # SENSIBLE — Contenido de ~/.docker/config.json en base64 (ArgoCD UI).
  # Generar con:
  #   kubectl create secret docker-registry tmp \
  #     --docker-server=registry.gitlab.com \
  #     --docker-username=<USUARIO> \
  #     --docker-password=<TOKEN> \
  #     --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  dockerconfigjson: ""

# -- Frontend (Deployment) ----------------------------------------------------
frontend:
  replicas: 1
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

# -- Ingress ------------------------------------------------------------------
ingress:
  host: empleados.desa.osfatun.com.ar   # Se sobreescribe por entorno
  className: pomerium
  tls: true
  # Política de acceso de Pomerium (JSON). Restringe quién puede acceder al
  # frontend por grupos de Keycloak. Se carga desde ArgoCD UI.
  # Ejemplo: '[{"allow":{"and":[{"claim/groups":"osfatun"}]}}]'
  policy: ""                             # OBLIGATORIO — cargar desde ArgoCD UI
  # Reenvía headers de identidad (X-Pomerium-Jwt-Assertion, etc.) al upstream.
  # El SPA puede consultar /.pomerium/jwt para obtener la identidad.
  passIdentityHeaders: true

# -- cert-manager -------------------------------------------------------------
certManager:
  issuerEmail: darioblanca.lp@gmail.com
