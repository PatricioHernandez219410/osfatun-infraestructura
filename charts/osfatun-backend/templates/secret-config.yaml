apiVersion: v1
kind: Secret
metadata:
  name: backend-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osfatun-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Django Core
  DEBUG: {{ .Values.django.debug | quote }}
  SECRET_KEY: {{ .Values.django.secretKey | quote }}
  ENV_STAGE: {{ .Values.django.envStage | quote }}
  DJANGO_SETTINGS_MODULE: {{ .Values.django.settingsModule | quote }}

  # Base de datos
  POSTGRES_DB: {{ .Values.db.name | quote }}
  POSTGRES_HOST: {{ .Values.db.host | quote }}
  POSTGRES_PORT: {{ .Values.db.port | quote }}
  DB_CONN_MAX_AGE: {{ .Values.db.connMaxAge | quote }}

  # Redis (servicio compartido — cada entorno usa distinto DB number)
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  REDIS_DB: {{ .Values.redis.db | quote }}
  REDIS_URL: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/{{ .Values.redis.db }}"

  # Celery
  CELERY_BROKER_URL: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/{{ .Values.redis.db }}"
  CELERY_RESULT_BACKEND: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/{{ .Values.redis.db }}"

  # Gunicorn
  GUNICORN_WORKERS: {{ .Values.gunicorn.workers | quote }}
  GUNICORN_THREADS: {{ .Values.gunicorn.threads | quote }}
  GUNICORN_TIMEOUT: {{ .Values.gunicorn.timeout | quote }}
  GUNICORN_MAX_REQUESTS: {{ .Values.gunicorn.maxRequests | quote }}
  GUNICORN_MAX_REQUESTS_JITTER: {{ .Values.gunicorn.maxRequestsJitter | quote }}

  # Seguridad y CORS
  ALLOWED_HOSTS: "{{ .Values.ingress.host }},localhost"
  CORS_ORIGIN_ALLOW_ALL: {{ .Values.cors.allowAll | quote }}
  CORS_ORIGIN_WHITELIST: {{ .Values.cors.whitelist | quote }}
  CSRF_TRUSTED_ORIGINS: {{ .Values.cors.trustedOrigins | quote }}
  SECURE_SSL_REDIRECT: {{ .Values.django.sslRedirect | quote }}

  # Email (SMTP)
  EMAIL_HOST: {{ .Values.email.host | quote }}
  EMAIL_PORT: {{ .Values.email.port | quote }}
  EMAIL_USE_TLS: {{ .Values.email.useTls | quote }}
  EMAIL_HOST_USER: {{ .Values.email.user | quote }}
  EMAIL_HOST_PASSWORD: {{ .Values.email.password | quote }}
  DEFAULT_FROM_EMAIL: {{ .Values.email.defaultFrom | quote }}

  # Sentry
  SENTRY_DSN: {{ .Values.sentry.dsn | quote }}
  SENTRY_TRACES_SAMPLE_RATE: {{ .Values.sentry.tracesSampleRate | quote }}

  # WhatsApp Business API
  WHATSAPP_API_URL: {{ .Values.whatsapp.apiUrl | quote }}
  WHATSAPP_API_TOKEN: {{ .Values.whatsapp.apiToken | quote }}
  WHATSAPP_PHONE_NUMBER_ID: {{ .Values.whatsapp.phoneNumberId | quote }}

  # Sistema externo
  EXTERNAL_SYSTEM_API_URL: {{ .Values.externalSystem.apiUrl | quote }}
  EXTERNAL_SYSTEM_API_KEY: {{ .Values.externalSystem.apiKey | quote }}
  EXTERNAL_SYSTEM_USERNAME: {{ .Values.externalSystem.username | quote }}
  EXTERNAL_SYSTEM_PASSWORD: {{ .Values.externalSystem.password | quote }}

  # Sincronización
  SYNC_FREQUENCY_MINUTES: {{ .Values.sync.frequencyMinutes | quote }}
  SYNC_ENABLED: {{ .Values.sync.enabled | quote }}

  # Webhooks
  WEBHOOK_API_URL: {{ .Values.webhook.apiUrl | quote }}
  WEBHOOK_API_TOKEN: {{ .Values.webhook.apiToken | quote }}

  # Keycloak (IdP / OIDC)
  KEYCLOAK_URL: {{ .Values.keycloak.url | quote }}
  KEYCLOAK_FRONTEND_URL: {{ .Values.keycloak.frontendUrl | quote }}
  KEYCLOAK_REALM: {{ .Values.keycloak.realm | quote }}
  KEYCLOAK_ADMIN_USER: {{ .Values.keycloak.adminUser | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.keycloak.adminPassword | quote }}
  KEYCLOAK_ADMIN_CLIENT_ID: {{ .Values.keycloak.adminClientId | quote }}
  KEYCLOAK_ENVIRONMENT_GROUP: {{ .Values.keycloak.environmentGroup | quote }}

  # Usuario administrador inicial (ensure_admin)
  ADMIN_USERNAME: {{ .Values.admin.username | quote }}
  ADMIN_PASSWORD: {{ .Values.admin.password | quote }}
  ADMIN_EMAIL: {{ .Values.admin.email | quote }}
  ADMIN_FIRST_NAME: {{ .Values.admin.firstName | quote }}
  ADMIN_LAST_NAME: {{ .Values.admin.lastName | quote }}
  ADMIN_DNI: {{ .Values.admin.dni | quote }}

  # Logging
  LOG_LEVEL: {{ .Values.django.logLevel | quote }}
