# =============================================================================
# OSFATUN Backend — Helm Values
# =============================================================================
# Valores por defecto del chart.
#
# Convención (IMPORTANTE):
#   - Campos con valor NO vacío  => defaults razonables; se pueden sobreescribir
#                                    desde ArgoCD (parameters o valueFiles) por
#                                    entorno si hace falta.
#   - Campos con valor ""        => SENSIBLES. El chart los deja explícitamente
#                                    vacíos para obligar a cargarlos desde la
#                                    interfaz web de ArgoCD como `parameters`
#                                    del Application. De este modo NUNCA quedan
#                                    versionados en Git.
#
# Planilla completa de parameters a cargar en ArgoCD UI por cada entorno:
#   -> kubernetes/documentacion/argocd-backend-values.md
#
# Prerequisito: crear la base de datos en PostgreSQL:
#   kubectl exec -it -n database main-db-1 -- psql -U postgres \
#     -c "CREATE DATABASE <nombre_db> OWNER app;"
#
# Multi-entorno: cada entorno se despliega en su propio namespace con
# distinta DB y distinto Redis DB number. Redis es un servicio compartido
# desplegado en el namespace "redis" (ver charts/redis/).
# =============================================================================

# -- Imagen del backend -------------------------------------------------------
image:
  # Registry + repo. Se sobreescribe por entorno desde el Application YAML.
  repository: ""          # ej: registry.gitlab.com/org/osfatun-backend
  tag: latest
  pullPolicy: Always

imagePullSecret:
  # SENSIBLE — Contenido de ~/.docker/config.json en base64 (ArgoCD UI).
  # Generar con:
  #   kubectl create secret docker-registry tmp \
  #     --docker-server=registry.gitlab.com \
  #     --docker-username=<USUARIO> \
  #     --docker-password=<TOKEN> \
  #     --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  dockerconfigjson: ""

# -- Base de datos (CloudNativePG) --------------------------------------------
# El password DEBE coincidir con main-db-app-credentials de cloudnativepg.yaml.
db:
  user: app
  password: ""            # SENSIBLE — ArgoCD UI
  host: main-db-rw.database.svc.cluster.local
  port: "5432"
  name: osfatun           # Se sobreescribe por entorno (osfatun, osfatun_qa, osfatun_dev)
  connMaxAge: "60"

# -- Redis (servicio compartido en namespace "redis") -------------------------
# Cada entorno usa un DB number distinto para aislar datos.
# prod=0, qa=1, dev=2, etc.
redis:
  host: redis.redis.svc.cluster.local
  port: "6379"
  db: "0"                 # Se sobreescribe por entorno

# -- Django -------------------------------------------------------------------
django:
  secretKey: ""           # SENSIBLE — ArgoCD UI (generar con get_random_secret_key)
  debug: "False"
  settingsModule: config.settings.production
  envStage: DESA    # Se sobreescribe por entorno (PRODUCTION, QA, DEVELOPMENT)
  logLevel: INFO
  sslRedirect: "False"    # TLS lo termina Pomerium, no Django

# -- Gunicorn -----------------------------------------------------------------
gunicorn:
  workers: "4"
  threads: "2"
  timeout: "120"
  maxRequests: "1000"
  maxRequestsJitter: "50"

# -- Backend (Deployment) ----------------------------------------------------
backend:
  replicas: 1
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m

# -- Celery Worker ------------------------------------------------------------
celeryWorker:
  replicas: 1
  concurrency: 4
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# -- Celery Beat (SIEMPRE 1 réplica — no escalar) ----------------------------
celeryBeat:
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

# -- Media (PVC) --------------------------------------------------------------
media:
  storageClass: local-path
  size: 5Gi

# -- Ingress ------------------------------------------------------------------
ingress:
  host: api.osfatun.com.ar   # Se sobreescribe por entorno
  className: pomerium
  tls: true
  publicAccess: true

# -- cert-manager -------------------------------------------------------------
certManager:
  issuerEmail: darioblanca.lp@gmail.com

# -- Seguridad y CORS --------------------------------------------------------
cors:
  allowAll: "False"
  whitelist: "https://api.osfatun.com.ar"       # Se sobreescribe por entorno
  trustedOrigins: "https://api.osfatun.com.ar"  # Se sobreescribe por entorno

# -- Keycloak (IdP / OIDC) ----------------------------------------------------
# URL interna del cluster para llamadas server-to-server (Admin REST API).
# URL frontend (pública) para validar el issuer del JWT emitido a los browsers.
keycloak:
  url: "http://keycloak.keycloak.svc.cluster.local:8080"
  frontendUrl: "https://auth.osfatun.com.ar"
  realm: osfatun
  adminUser: ""           # SENSIBLE — ArgoCD UI (usuario admin del realm master)
  adminPassword: ""       # SENSIBLE — ArgoCD UI
  adminClientId: admin-cli

# -- Email (SMTP) ------------------------------------------------------------
email:
  host: smtp.gmail.com
  port: "587"
  useTls: "True"
  user: ""                # SENSIBLE — ArgoCD UI
  password: ""            # SENSIBLE — ArgoCD UI
  defaultFrom: ""         # ej: noreply@osfatun.ticksar.com.ar (no sensible pero por-entorno)

# -- Sentry ------------------------------------------------------------------
sentry:
  dsn: ""                 # SENSIBLE (opcional) — ArgoCD UI; vacío desactiva Sentry
  tracesSampleRate: "0.1"

# -- WhatsApp Business API ----------------------------------------------------
whatsapp:
  apiUrl: "https://graph.facebook.com/v21.0"
  apiToken: ""            # SENSIBLE (opcional) — ArgoCD UI
  phoneNumberId: ""       # SENSIBLE (opcional) — ArgoCD UI

# -- Sistema externo (sincronización) ----------------------------------------
externalSystem:
  apiUrl: ""              # Por-entorno (opcional) — puede ir en Git
  apiKey: ""              # SENSIBLE (opcional) — ArgoCD UI
  username: ""            # SENSIBLE (opcional) — ArgoCD UI
  password: ""            # SENSIBLE (opcional) — ArgoCD UI

# -- Sincronización -----------------------------------------------------------
sync:
  frequencyMinutes: "30"
  enabled: "True"

# -- Webhooks -----------------------------------------------------------------
webhook:
  apiUrl: ""              # Por-entorno (opcional) — puede ir en Git
  apiToken: ""            # SENSIBLE (opcional) — ArgoCD UI
