# =============================================================================
# ArgoCD — Ingress via Pomerium (acceso restringido a grupo "admin")
# =============================================================================
# Expone la UI de ArgoCD en https://argo.osfatun.ticksar.com.ar
# Solo usuarios del grupo "admin" en Keycloak pueden acceder.
#
# Prerequisitos:
#   1. ArgoCD instalado (kubectl apply -n argocd -f ...install.yaml)
#   2. Pomerium + Keycloak integrados y funcionando
#   3. En Keycloak:
#      a. Crear grupo "admin" (realm osfatun → Groups → Create group)
#      b. Asignar usuarios al grupo
#      c. En el client "pomerium" → Client scopes → pomerium-dedicated →
#         Add mapper → By configuration → Group Membership:
#           - Name: groups
#           - Token Claim Name: groups
#           - Full group path: OFF
#           - Add to ID token: ON
#           - Add to access token: ON
#           - Add to userinfo: ON
#
# Aplicar:
#   kubectl apply -f argocd-ingress.yaml
#   kubectl rollout restart deployment/argocd-server -n argocd
# =============================================================================

# --- ArgoCD: modo inseguro (HTTP interno) ------------------------------------
# Pomerium/Ingress termina TLS. Sin esto, ArgoCD redirige infinitamente
# porque intenta forzar HTTPS en la conexión interna.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  server.insecure: "true"

---
# --- cert-manager: Issuer para namespace argocd ------------------------------
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-prod
  namespace: argocd
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: darioblanca.lp@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: pomerium

---
# --- ArgoCD: Ingress ----------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
    ingress.pomerium.io/policy: '[{"allow":{"and":[{"groups":{"has":"admin"}}]}}]'
spec:
  ingressClassName: pomerium
  tls:
    - hosts:
        - argo.osfatun.ticksar.com.ar
      secretName: argocd-tls
  rules:
    - host: argo.osfatun.ticksar.com.ar
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
