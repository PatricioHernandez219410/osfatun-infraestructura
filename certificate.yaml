# =============================================================================
# NOTA: Este Certificate standalone YA NO ES NECESARIO cuando se utiliza
# spec.authenticate.ingress en pomerium.yaml con la anotación de cert-manager.
# cert-manager crea automáticamente un Certificate a partir del Ingress.
#
# Antes de aplicar el nuevo pomerium.yaml, eliminar el Certificate y Secret
# antiguos del cluster:
#   kubectl delete certificate pomerium-proxy-tls -n pomerium
#   kubectl delete secret pomerium-proxy-tls -n pomerium
#
# Conservado como referencia. NO aplicar junto con el nuevo pomerium.yaml.
# =============================================================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pomerium-proxy-tls
  namespace: pomerium
spec:
  dnsNames:
  - 'authenticate.prueba.ticksar.com.ar'
  issuerRef:
    kind: Issuer
    name: letsencrypt-prod
  secretName: pomerium-proxy-tls
